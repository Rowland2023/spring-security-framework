# Application Name
spring.application.name=sample-application

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/security_db
spring.datasource.username=postgres
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate behavior
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# 🔐 Custom Security Starter Configuration
# IMPORTANT: Key must be 32+ characters for HS256 algorithm
security.jwt.secret=my-super-secret-key-at-least-256-bits-long-v1-v2
# Expiry: 1 Hour (in milliseconds)
security.jwt.expiry=3600000

# Logging Levels
logging.level.com.rowland.security=DEBUG
logging.level.org.springframework.security=INFO